name: Daily AI Security News

on:
  schedule:
    - cron: '30 22 * * *'  # 毎日07:30 JST
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser google-genai python-dateutil

      - name: Fetch and summarize news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/fetch_and_summarize.py

      - name: Build website
        run: python scripts/build_site.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "変更なし" && exit 0
          git commit -m "Daily update: $(date '+%Y-%m-%d')"
          git push --force-with-lease
