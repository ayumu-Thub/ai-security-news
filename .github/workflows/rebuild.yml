name: Rebuild Site Only (No API)

on:
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-dateutil

      - name: Build website
        run: python scripts/build_site.py

      - name: Verify data files unchanged
        run: |
          if ! git diff --quiet docs/data/; then
            echo "ERROR: docs/data/ was modified. Aborting to protect data."
            git diff docs/data/ | head -50
            exit 1
          fi
          echo "OK: data files untouched"

      - name: Commit and push HTML only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/archive/ docs/article/ docs/sitemap.xml docs/robots.txt docs/favicon.png docs/og-image.png docs/apple-touch-icon.png
          git diff --cached --quiet && echo "No HTML changes" && exit 0
          git commit -m "Rebuild site: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')"
          git push
